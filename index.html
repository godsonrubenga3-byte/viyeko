<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>VIYEKO - Roadside Assistance</title>
    <meta name="theme-color" content="#121212" />
    <meta name="description" content="Tanzania's Live Emergency Roadside Assistance Network. Get connected to nearby mechanics instantly." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://viyeko.vercel.app/" />
    <meta property="og:title" content="VIYEKO - Roadside Rescue" />
    <meta property="og:description" content="Tanzania's Live Emergency Roadside Assistance Network. Get connected to nearby mechanics instantly." />
    <meta property="og:image" content="https://viyeko.vercel.app/pwa-512x512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://viyeko.vercel.app/" />
    <meta property="twitter:title" content="VIYEKO - Roadside Rescue" />
    <meta property="twitter:description" content="Tanzania's Live Emergency Roadside Assistance Network. Get connected to nearby mechanics instantly." />
    <meta property="twitter:image" content="https://viyeko.vercel.app/pwa-512x512.png" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    
    <!-- Theme Flash Protection -->
    <script>
      (function() {
        const theme = localStorage.getItem('viyeko_theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-charcoal text-white transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
